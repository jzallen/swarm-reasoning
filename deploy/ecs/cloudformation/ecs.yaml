AWSTemplateFormatVersion: "2010-09-09"
Description: >
  swarm-reasoning — ECS cluster, services, ALB, auto-scaling.
  Backend and Agent Service scale to zero; Temporal is always-on.

Parameters:
  EnvironmentName:
    Type: String
    Default: swarm-reasoning
  ACMCertificateArn:
    Type: String
    Description: ARN of ACM certificate for HTTPS on ALB
  BackendImageUri:
    Type: String
    Description: ECR image URI for backend
  AgentServiceImageUri:
    Type: String
    Description: ECR image URI for agent-service
  VPCId:
    Type: String
  PublicSubnet1Id:
    Type: String
  PublicSubnet2Id:
    Type: String
  PrivateSubnet1Id:
    Type: String
  PrivateSubnet2Id:
    Type: String
  ALBSecurityGroupId:
    Type: String
  BackendSecurityGroupId:
    Type: String
  AgentServiceSecurityGroupId:
    Type: String
  TemporalSecurityGroupId:
    Type: String
  ECSExecutionRoleArn:
    Type: String
  BackendTaskRoleArn:
    Type: String
  AgentServiceTaskRoleArn:
    Type: String

Resources:
  # ---------------------------------------------------------------------------
  # ECS Cluster
  # ---------------------------------------------------------------------------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${EnvironmentName}-cluster"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

  # ---------------------------------------------------------------------------
  # CloudWatch Log Groups
  # ---------------------------------------------------------------------------
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EnvironmentName}/backend"
      RetentionInDays: 14

  AgentServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EnvironmentName}/agent-service"
      RetentionInDays: 14

  TemporalLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EnvironmentName}/temporal"
      RetentionInDays: 14

  # ---------------------------------------------------------------------------
  # ALB
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroupId
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id

  ALBHTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref ACMCertificateArn
      DefaultAction:
        Type: fixed-response
        FixedResponseConfig:
          StatusCode: "404"
          ContentType: text/plain
          MessageBody: "Not Found"

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-backend-tg"
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VPCId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  BackendListenerRuleSessions:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBHTTPSListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - "/sessions/*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  BackendListenerRuleHealth:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBHTTPSListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          Values:
            - "/health"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ---------------------------------------------------------------------------
  # Backend Task Definition + Service
  # ---------------------------------------------------------------------------
  BackendTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-backend"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !Ref ECSExecutionRoleArn
      TaskRoleArn: !Ref BackendTaskRoleArn
      ContainerDefinitions:
        - Name: backend
          Image: !Ref BackendImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3000
          Environment:
            - Name: NODE_ENV
              Value: production
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/database-url"
            - Name: REDIS_URL
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/redis-url"
            - Name: TEMPORAL_ADDRESS
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/temporal-address"
          HealthCheck:
            Command: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: backend

  BackendService:
    Type: AWS::ECS::Service
    DependsOn: BackendListenerRuleSessions
    Properties:
      ServiceName: !Sub "${EnvironmentName}-backend"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTaskDef
      DesiredCount: 0
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref BackendSecurityGroupId
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 3000
          TargetGroupArn: !Ref BackendTargetGroup

  # ---------------------------------------------------------------------------
  # Agent Service Task Definition + Service
  # ---------------------------------------------------------------------------
  AgentServiceTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-agent-service"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "1024"
      Memory: "2048"
      ExecutionRoleArn: !Ref ECSExecutionRoleArn
      TaskRoleArn: !Ref AgentServiceTaskRoleArn
      ContainerDefinitions:
        - Name: agent-service
          Image: !Ref AgentServiceImageUri
          Essential: true
          Secrets:
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/anthropic-api-key"
            - Name: GOOGLE_FACTCHECK_API_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/google-factcheck-api-key"
            - Name: NEWSAPI_KEY
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/newsapi-key"
            - Name: REDIS_URL
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/redis-url"
            - Name: TEMPORAL_ADDRESS
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/temporal-address"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AgentServiceLogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: agent-service

  AgentServiceService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${EnvironmentName}-agent-service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref AgentServiceTaskDef
      DesiredCount: 0
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref AgentServiceSecurityGroupId
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id

  # ---------------------------------------------------------------------------
  # Temporal Task Definition + Service (always-on)
  # ---------------------------------------------------------------------------
  TemporalTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-temporal"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "1024"
      Memory: "2048"
      ExecutionRoleArn: !Ref ECSExecutionRoleArn
      ContainerDefinitions:
        - Name: temporal
          Image: temporalio/auto-setup:latest
          Essential: true
          PortMappings:
            - ContainerPort: 7233
          Environment:
            - Name: DB
              Value: postgresql
            - Name: DB_PORT
              Value: "5432"
            - Name: TEMPORAL_NAMESPACE
              Value: swarm-reasoning
          Secrets:
            - Name: POSTGRES_USER
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/temporal-db-user"
            - Name: POSTGRES_PWD
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/temporal-db-password"
            - Name: POSTGRES_SEEDS
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/temporal-db-host"
          HealthCheck:
            Command: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7233'"]
            Interval: 30
            Timeout: 5
            Retries: 5
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref TemporalLogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: temporal

  TemporalService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${EnvironmentName}-temporal"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TemporalTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref TemporalSecurityGroupId
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id

  # ---------------------------------------------------------------------------
  # Auto Scaling — Backend
  # ---------------------------------------------------------------------------
  BackendScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 3
      MinCapacity: 0
      ResourceId: !Sub "service/${ECSCluster}/${BackendService.Name}"
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  BackendScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${EnvironmentName}-backend-scaling"
      PolicyType: TargetTrackingScaling
      ScalableTargetId: !Ref BackendScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ALBRequestCountPerTarget
          ResourceLabel: !Sub "${ALB.LoadBalancerFullName}/${BackendTargetGroup.TargetGroupFullName}"
        TargetValue: 100
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # ---------------------------------------------------------------------------
  # Auto Scaling — Agent Service
  # ---------------------------------------------------------------------------
  AgentServiceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 2
      MinCapacity: 0
      ResourceId: !Sub "service/${ECSCluster}/${AgentServiceService.Name}"
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  AgentServiceScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${EnvironmentName}-agent-service-scaling"
      PolicyType: TargetTrackingScaling
      ScalableTargetId: !Ref AgentServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  ECSClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${EnvironmentName}-ECSClusterName"
  ALBDNSName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub "${EnvironmentName}-ALBDNSName"
  ALBHostedZoneId:
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export:
      Name: !Sub "${EnvironmentName}-ALBHostedZoneId"
