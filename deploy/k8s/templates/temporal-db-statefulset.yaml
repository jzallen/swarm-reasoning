apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temporal-db
  labels:
    {{- include "swarm-reasoning.labels" . | nindent 4 }}
    app.kubernetes.io/name: temporal-db
spec:
  serviceName: temporal-db
  replicas: {{ .Values.replicas.temporalDb }}
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-db
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-db
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: temporal-db
          image: "{{ .Values.images.temporalDb.repository }}:{{ .Values.images.temporalDb.tag }}"
          imagePullPolicy: {{ .Values.images.temporalDb.pullPolicy }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PASSWORD
              value: temporal
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "temporal"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.temporalDb | nindent 12 }}
          volumeMounts:
            - name: temporal-db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: temporal-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.temporalDb.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.temporalDb.size }}
