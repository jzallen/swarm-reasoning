openapi: 3.0.3

info:
  title: swarm-reasoning Session API
  version: 1.0.0
  description: |
    Session-based REST API for claim submission, real-time progress streaming,
    verdict retrieval, and observation audit access.

    All endpoints are served by the NestJS backend. No authentication is
    required for the prototype.

  contact:
    name: swarm-reasoning
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: NestJS backend (local development)

tags:
  - name: Sessions
    description: Session lifecycle and claim submission
  - name: Verdicts
    description: Verdict retrieval with citations
  - name: Observations
    description: Observation stream audit log
  - name: System
    description: Health checks

paths:

  # ---------------------------------------------------------------------------
  # Sessions
  # ---------------------------------------------------------------------------

  /sessions:
    post:
      tags: [Sessions]
      operationId: createSession
      summary: Create a new session
      description: |
        Creates a new session and returns the generated session ID. The session
        starts in `active` status.
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}:
    get:
      tags: [Sessions]
      operationId: getSession
      summary: Get session status
      description: |
        Returns session data. If the session is `active`, returns the full
        session object. If the session is `frozen`, includes a `snapshotUrl`
        pointing to the immutable snapshot.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/claims:
    post:
      tags: [Sessions]
      operationId: submitClaim
      summary: Submit a claim to a session
      description: |
        Submits a claim for fact-checking within the given session. The claim
        is validated, a run is initiated, and processing begins immediately.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Claim'
            example:
              claimText: "Biden issued a federal vaccine mandate for all private employers."
              sourceUrl: "https://example.com/article/12345"
              sourceDate: "2021-11-04"
      responses:
        '202':
          description: Claim accepted, run initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/events:
    get:
      tags: [Sessions]
      operationId: getSessionEvents
      summary: SSE endpoint for real-time progress
      description: |
        Server-Sent Events stream that emits real-time progress updates for
        the session's active run. Event types: `progress`, `verdict`, `close`.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ProgressEvent'

  /sessions/{sessionId}/verdict:
    get:
      tags: [Verdicts]
      operationId: getVerdict
      summary: Get verdict with citations
      description: |
        Returns the finalized verdict for the session's run, including
        factuality score, rating label, narrative, and citations.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Verdict with citations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Verdict'
        '404':
          description: Session or verdict not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/observations:
    get:
      tags: [Observations]
      operationId: getObservations
      summary: Get full observation log for a session's run
      description: |
        Returns all observations from all agent streams for the session's run.
        The observation log is the authoritative audit record.
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Observation log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Observation'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # System
  # ---------------------------------------------------------------------------

  /health:
    get:
      tags: [System]
      operationId: healthCheck
      summary: Health check
      description: Returns health status of the backend and its dependent services.
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------

components:

  parameters:
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique session identifier

  schemas:

    Session:
      type: object
      required: [sessionId, status, createdAt]
      properties:
        sessionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, frozen, expired]
        claim:
          type: string
          description: The claim text submitted to this session
        createdAt:
          type: string
          format: date-time
        frozenAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        snapshotUrl:
          type: string
          format: uri
          nullable: true

    Claim:
      type: object
      required: [claimText]
      properties:
        claimText:
          type: string
          maxLength: 2000
          description: The claim text to be fact-checked.
        sourceUrl:
          type: string
          format: uri
          description: URL of the source article or document.
        sourceDate:
          type: string
          format: date
          description: Publication date of the source.

    Verdict:
      type: object
      required: [verdictId, factualityScore, ratingLabel, narrative, signalCount, citations, finalizedAt]
      properties:
        verdictId:
          type: string
        factualityScore:
          type: number
          minimum: 0.0
          maximum: 1.0
        ratingLabel:
          type: string
          enum: ["true", mostly-true, half-true, mostly-false, "false", pants-on-fire]
        narrative:
          type: string
        signalCount:
          type: integer
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        finalizedAt:
          type: string
          format: date-time

    Citation:
      type: object
      required: [sourceUrl, sourceName, agent, observationCode, validationStatus, convergenceCount]
      properties:
        sourceUrl:
          type: string
          format: uri
        sourceName:
          type: string
        agent:
          type: string
        observationCode:
          type: string
        validationStatus:
          type: string
          enum: [live, dead, redirect, soft-404, timeout, not-validated]
        convergenceCount:
          type: integer

    Observation:
      type: object
      required: [runId, agent, seq, code, value, valueType, status, timestamp]
      properties:
        runId:
          type: string
        agent:
          type: string
        seq:
          type: integer
        code:
          type: string
        value:
          type: string
        valueType:
          type: string
        units:
          type: string
          nullable: true
        referenceRange:
          type: string
          nullable: true
        status:
          type: string
          enum: [P, F, C, X]
          description: "Epistemic status: P (preliminary), F (final), C (corrected), X (cancelled)"
        timestamp:
          type: string
          format: date-time
        method:
          type: string
          nullable: true
        note:
          type: string
          nullable: true

    ProgressEvent:
      type: object
      properties:
        runId:
          type: string
        agent:
          type: string
        phase:
          type: string
        type:
          type: string
          enum: [progress, verdict, close]
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        services:
          type: object
          properties:
            temporal:
              type: string
              enum: [reachable, unreachable]
            postgresql:
              type: string
              enum: [reachable, unreachable]
            redis:
              type: string
              enum: [reachable, unreachable]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
