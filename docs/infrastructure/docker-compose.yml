    container_name: claim-detector
    networks: [internal]
    environment:
      - AGENT_NAME=claim-detector
      - YOTTADB_HOST=ydb-detector
      - MIRTH_HOST=mirth-detector
      - ORCHESTRATOR_MIRTH_HOST=mirth-orchestrator
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_PORT=9002
      - CHECK_WORTHY_THRESHOLD=0.4
    depends_on:
      ydb-detector:
        condition: service_healthy
      mirth-detector:
        condition: service_healthy
    restart: unless-stopped

  ydb-detector:
    image: yottadb/yottadb:latest
    container_name: ydb-detector
    networks: [internal]
    volumes: [ydb-detector:/data]
    environment: [ydb_dir=/data]
    healthcheck:
      test: ["CMD", "ydb", "-run", "WRITE 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mirth-detector:
    image: nextgenhealthcare/connect:latest
    container_name: mirth-detector
    networks: [internal]
    volumes:
      - ./mirth-config/claim-detector:/opt/connect/appdata/channel-definitions:ro
    environment: [DATABASE=derby]
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8443/api/server/version"]
