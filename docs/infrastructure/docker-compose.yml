    restart: unless-stopped

  # --- ClaimReview Matcher ---

  claimreview-matcher:
    build:
      context: ./services/agents/claimreview-matcher
      dockerfile: Dockerfile
    container_name: claimreview-matcher
    networks: [internal]
    environment:
      - AGENT_NAME=claimreview-matcher
      - YOTTADB_HOST=ydb-claimreview
      - MIRTH_HOST=mirth-claimreview
      - ORCHESTRATOR_MIRTH_HOST=mirth-orchestrator
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_FACTCHECK_API_KEY=${GOOGLE_FACTCHECK_API_KEY}
      - MCP_PORT=9004
      - MATCH_SCORE_THRESHOLD=0.75
    depends_on:
      ydb-claimreview:
        condition: service_healthy
      mirth-claimreview:
