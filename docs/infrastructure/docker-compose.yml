name: swarm-reasoning

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
# All containers communicate on the internal bridge network.
# Only the consumer-api and redis ports are exposed to the host.
# Agent MCP servers are internal-only.
# ---------------------------------------------------------------------------

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
# Redis uses a named volume for persistence across restarts.
# ---------------------------------------------------------------------------

volumes:
  redis-data:

# ---------------------------------------------------------------------------
# Services — 13 containers total
# ---------------------------------------------------------------------------

services:

  # -------------------------------------------------------------------------
  # Redis — Shared Data Plane
  # -------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - internal
      - external
    ports:
      - "6379:6379"   # Exposed to host for dev tooling (redis-cli, RedisInsight)
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Orchestrator
  # -------------------------------------------------------------------------

  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    networks:
      - internal
    environment:
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AGENT_HEARTBEAT_INTERVAL=15
      - AGENT_HEARTBEAT_TIMEOUT=30
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Consumer API
  # -------------------------------------------------------------------------

  consumer-api:
    build:
      context: ./services/consumer-api
      dockerfile: Dockerfile
    container_name: consumer-api
    networks:
      - internal
      - external
    ports:
      - "8000:8000"   # REST API — exposed to host
    environment:
      - REDIS_URL=redis://redis:6379
      - ORCHESTRATOR_HOST=orchestrator
      - ORCHESTRATOR_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Agent Services
  # Each agent is a single lightweight container exposing an MCP server.
  # All agents publish observations to Redis Streams.
  # -------------------------------------------------------------------------

  # --- Ingestion Agent ---

  ingestion-agent:
    build:
      context: ./services/agents/ingestion
      dockerfile: Dockerfile
    container_name: ingestion-agent
    networks:
      - internal
    environment:
      - AGENT_NAME=ingestion-agent
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_PORT=9001
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Claim Detector ---

  claim-detector:
    build:
      context: ./services/agents/claim-detector
      dockerfile: Dockerfile
    container_name: claim-detector
    networks:
      - internal
    environment:
      - AGENT_NAME=claim-detector
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_PORT=9002
      - CHECK_WORTHY_THRESHOLD=0.4
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Entity Extractor ---

  entity-extractor:
    build:
      context: ./services/agents/entity-extractor
      dockerfile: Dockerfile
    container_name: entity-extractor
    networks:
      - internal
    environment:
      - AGENT_NAME=entity-extractor
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_PORT=9003
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- ClaimReview Matcher ---

  claimreview-matcher:
    build:
      context: ./services/agents/claimreview-matcher
      dockerfile: Dockerfile
    container_name: claimreview-matcher
    networks:
      - internal
    environment:
      - AGENT_NAME=claimreview-matcher
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_FACTCHECK_API_KEY=${GOOGLE_FACTCHECK_API_KEY}
      - MCP_PORT=9004
      - MATCH_SCORE_THRESHOLD=0.75
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Coverage Agents (Left / Center / Right share build context) ---

  coverage-left:
    build:
      context: ./services/agents/coverage
      dockerfile: Dockerfile
    container_name: coverage-left
    networks:
      - internal
    environment:
      - AGENT_NAME=coverage-left
      - SPECTRUM=left
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - MCP_PORT=9005
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  coverage-center:
    build:
      context: ./services/agents/coverage
      dockerfile: Dockerfile
    container_name: coverage-center
    networks:
      - internal
    environment:
      - AGENT_NAME=coverage-center
      - SPECTRUM=center
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - MCP_PORT=9006
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  coverage-right:
    build:
      context: ./services/agents/coverage
      dockerfile: Dockerfile
    container_name: coverage-right
    networks:
      - internal
    environment:
      - AGENT_NAME=coverage-right
      - SPECTRUM=right
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - MCP_PORT=9007
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Blindspot Detector ---

  blindspot-detector:
    build:
      context: ./services/agents/blindspot-detector
      dockerfile: Dockerfile
    container_name: blindspot-detector
    networks:
      - internal
    environment:
      - AGENT_NAME=blindspot-detector
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_PORT=9008
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Domain Evidence ---

  domain-evidence:
    build:
      context: ./services/agents/domain-evidence
      dockerfile: Dockerfile
    container_name: domain-evidence
    networks:
      - internal
    environment:
      - AGENT_NAME=domain-evidence
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_PORT=9009
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Synthesizer ---

  synthesizer:
    build:
      context: ./services/agents/synthesizer
      dockerfile: Dockerfile
    container_name: synthesizer
    networks:
      - internal
    environment:
      - AGENT_NAME=synthesizer
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_PORT=9010
      - STREAM_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
