name: hl7-agent-factchecker

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
# All containers communicate on the internal bridge network.
# Only the consumer-api and mirth-orchestrator-admin ports are exposed
# to the host. Agent MCP servers and YottaDB instances are internal-only.
# ---------------------------------------------------------------------------

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
# Each YottaDB instance gets a named volume for persistence across restarts.
# Mirth configuration is mounted from ./mirth-config/ per instance.
# ---------------------------------------------------------------------------

volumes:
  ydb-orchestrator:
  ydb-ingestion:
  ydb-detector:
  ydb-entity:
  ydb-claimreview:
  ydb-coverage-left:
  ydb-coverage-center:
  ydb-coverage-right:
  ydb-blindspot:
  ydb-domain:
  ydb-synthesizer:
  mirth-orchestrator-appdata:
  mirth-orchestrator-db:

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------

services:

  # -------------------------------------------------------------------------
  # Orchestrator Bundle
  # -------------------------------------------------------------------------

  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    networks:
      - internal
    environment:
      - YOTTADB_HOST=ydb-orchestrator
      - YOTTADB_PORT=9080
      - MIRTH_HOST=mirth-orchestrator
      - MIRTH_PORT=6661
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AGENT_HEARTBEAT_INTERVAL=15
      - AGENT_HEARTBEAT_TIMEOUT=30
    depends_on:
      ydb-orchestrator:
        condition: service_healthy
      mirth-orchestrator:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ydb-orchestrator:
    image: yottadb/yottadb:latest
    container_name: ydb-orchestrator
    networks:
      - internal
    volumes:
      - ydb-orchestrator:/data
    environment:
      - ydb_dir=/data
    healthcheck:
      test: ["CMD", "ydb", "-run", "WRITE 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mirth-orchestrator:
    image: nextgenhealthcare/connect:latest
    container_name: mirth-orchestrator
    networks:
      - internal
      - external
    ports:
      - "8443:8443"   # Mirth admin console — exposed to host for dev only
    volumes:
      - ./mirth-config/orchestrator:/opt/connect/appdata/channel-definitions:ro
      - mirth-orchestrator-appdata:/opt/connect/appdata
      - mirth-orchestrator-db:/opt/connect/mirthdb
    environment:
      - DATABASE=derby
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8443/api/server/version"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Consumer API
  # -------------------------------------------------------------------------

  consumer-api:
    build:
      context: ./services/consumer-api
      dockerfile: Dockerfile
    container_name: consumer-api
    networks:
      - internal
      - external
    ports:
      - "8000:8000"   # REST API — exposed to host
    environment:
      - ORCHESTRATOR_HOST=orchestrator
      - ORCHESTRATOR_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Agent Bundle Template
  # Each agent follows the same three-container pattern:
  #   agent process + YottaDB + Mirth
  # MLLP ports are internal-only. MCP ports are internal-only.
  # -------------------------------------------------------------------------

  # --- Ingestion Agent ---

  ingestion-agent:
    build:
      context: ./services/agents/ingestion
      dockerfile: Dockerfile
    container_name: ingestion-agent
    networks:
      - internal
    environment:
      - AGENT_NAME=ingestion-agent
      - YOTTADB_HOST=ydb-ingestion
      - MIRTH_HOST=mirth-ingestion
      - MIRTH_PORT=6661
      - ORCHESTRATOR_MIRTH_HOST=mirth-orchestrator
      - ORCHESTRATOR_MIRTH_PORT=6661
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_PORT=9001
    depends_on:
      ydb-ingestion:
        condition: service_healthy
      mirth-ingestion:
        condition: service_healthy
    restart: unless-stopped

  ydb-ingestion:
    image: yottadb/yottadb:latest
    container_name: ydb-ingestion
    networks: [internal]
    volumes:
      - ydb-ingestion:/data
    environment: [ydb_dir=/data]
    healthcheck:
      test: ["CMD", "ydb", "-run", "WRITE 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mirth-ingestion:
    image: nextgenhealthcare/connect:latest
    container_name: mirth-ingestion
    networks: [internal]
    volumes:
      - ./mirth-config/ingestion:/opt/connect/appdata/channel-definitions:ro
    environment: [DATABASE=derby]
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8443/api/server/version"]
