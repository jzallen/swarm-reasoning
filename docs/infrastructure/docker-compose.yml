      timeout: 10s
      retries: 10
    restart: unless-stopped

  # --- Entity Extractor ---

  entity-extractor:
    build:
      context: ./services/agents/entity-extractor
      dockerfile: Dockerfile
    container_name: entity-extractor
    networks: [internal]
    environment:
