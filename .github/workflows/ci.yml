name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "services/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"

jobs:
  lint-and-test-backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/backend/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - run: npx prettier --check .
      - run: npm test

  lint-and-test-frontend:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - run: npx prettier --check .
      - run: npx vitest run

  lint-and-test-agent-service:
    name: Agent Service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/agent-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs:
      - lint-and-test-backend
      - lint-and-test-frontend
      - lint-and-test-agent-service
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t swarm-reasoning/backend services/backend
      - run: docker build -t swarm-reasoning/frontend services/frontend
      - run: docker build -t swarm-reasoning/agent-service services/agent-service
